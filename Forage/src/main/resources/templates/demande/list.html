<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Liste des Demandes</title>
</head>
<body>
<div layout:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="bi bi-file-text"></i> Demandes</h2>
        <a th:href="@{/demandes/new}" class="btn btn-primary">
            <i class="bi bi-plus"></i> Nouvelle Demande
        </a>
    </div>
    
    <div class="card">
        <div class="card-body">
            <table class="table table-striped table-hover">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Date</th>
                        <th>Client</th>
                        <th>Lieu</th>
                        <th>District</th>
                        <th>Statut</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="demande : ${demandes}">
                        <td th:text="${demande.id}"></td>
                        <td th:text="${#temporals.format(demande.date, 'dd/MM/yyyy')}"></td>
                        
                        <!-- Client - maintenant chargé via JOIN FETCH -->
                        <td th:text="${demande.client != null ? demande.client.nom : 'N/A'}"></td>
                        
                        <td th:text="${demande.lieu}"></td>
                        <td th:text="${demande.district}"></td>
                        
                        <!-- Statut -->
                        <td>
                            <span class="badge bg-info" 
                                  th:if="${demande.dernierStatus != null}"
                                  th:text="${demande.dernierStatus.status.libelle}"></span>
                            <span class="badge bg-secondary" 
                                  th:if="${demande.dernierStatus == null}">Non défini</span>
                        </td>
                        
                        <td>
                            <a th:href="@{/demandes/{id}(id=${demande.id})}" 
                               class="btn btn-sm btn-info" title="Voir">
                                <i class="bi bi-eye"></i>
                            </a>
                            <a th:href="@{/demandes/{id}/edit(id=${demande.id})}" 
                               class="btn btn-sm btn-warning" title="Modifier">
                                <i class="bi bi-pencil"></i>
                            </a>
                            <a th:href="@{/demandes/{id}/delete(id=${demande.id})}"
                               class="btn btn-sm btn-danger" title="Supprimer"
                               onclick="return confirm('Confirmer la suppression?')">
                                <i class="bi bi-trash"></i>
                            </a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(demandes)}">
                        <td colspan="7" class="text-center text-muted">Aucune demande</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
