<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulaire - Clients</title>
</head>
<body>
    <h1>Formulaire - Clients</h1>

    <form action="/clients/save" method="post">
        <input type="hidden" name="id" th:value="${client.id}" />
        <label for="nom">Nom:</label>
        <input type="text" id="nom" name="nom" th:value="${client.nom}" required />
        <br/>
        <label for="contact">Contact:</label>
        <input type="text" id="contact" name="contact" th:value="${client.contact}" required />
        <br/>
        <button type="submit">Enregistrer</button>
    </form>
</body>
</html>
