<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Système de Gestion des Corrections d'Examens</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 50px;
            max-width: 1000px;
            width: 100%;
        }
        h1 {
            color: #667eea;
            text-align: center;
            margin-bottom: 40px;
            font-size: 2.5em;
        }
        .menu {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        .menu-item {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px 20px;
            border-radius: 15px;
            text-decoration: none;
            text-align: center;
            transition: transform 0.3s, box-shadow 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .menu-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        .menu-item h2 {
            font-size: 1.3em;
            margin-bottom: 10px;
        }
        .menu-item p {
            font-size: 0.9em;
            opacity: 0.9;
        }
        .menu-item.notes {
            background: linear-gradient(135deg, #e67e22 0%, #d35400 100%);
        }
        .menu-item.final {
            background: linear-gradient(135deg, #27ae60 0%, #229954 100%);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📚 Système de Gestion des Corrections d'Examens - 3502</h1>
        <div class="menu">
            <a href="/etudiants" class="menu-item">
                <h2>👨‍🎓 Étudiants</h2>
                <p>Gérer les étudiants</p>
            </a>
            <a href="/matieres" class="menu-item">
                <h2>📖 Matières</h2>
                <p>Gérer les matières</p>
            </a>
            <a href="/notes" class="menu-item notes">
                <h2>📝 Notes</h2>
                <p>Saisir et gérer les notes</p>
            </a>
            <a href="/notes-final" class="menu-item final">
                <h2>🏆 Notes Finales</h2>
                <p>Calculer selon les règles</p>
            </a>
        </div>
    </div>
</body>
</html>
